version: '3.9'
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rescueai-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./disaster_response.db
      BACKEND_URL: http://localhost:8000
      JWT_SECRET: supersecretjwtkeyreplaceinproduction123!
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rescueai-frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
